name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: openagents-kit-x86_64-unknown-linux-gnu
            binary_name: openagents-kit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: openagents-kit-x86_64-pc-windows-msvc.exe
            binary_name: openagents-kit.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: openagents-kit-x86_64-apple-darwin
            binary_name: openagents-kit
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: openagents-kit-aarch64-apple-darwin
            binary_name: openagents-kit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p openagents-tui --all-features

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload release asset to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
            scripts/install.ps1
            scripts/install.sh

  publish-npm:
    name: Publish npm installer
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish package with trusted publishing
        id: publish_trusted
        continue-on-error: true
        run: npm publish --access public

      - name: Publish package with token fallback
        if: ${{ steps.publish_trusted.outcome == 'failure' && env.HAS_NPM_TOKEN == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Fail when npm publishing is still not configured
        if: ${{ steps.publish_trusted.outcome == 'failure' && env.HAS_NPM_TOKEN != 'true' }}
        run: |
          echo "Trusted publishing failed and NPM_TOKEN is not configured."
          echo "Run 'npm trust github openagents-kit --repo cccuong-jason/openagents-kit --file release.yml --yes' after completing npm browser authentication."
          exit 1
